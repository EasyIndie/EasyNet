name: Release

on:
  push:
    tags:
      # Match strict semver tags without a "v" prefix, e.g. 0.0.3, 1.2.0
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify VERSION file matches tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG=${GITHUB_REF_NAME}
          echo "VERSION file: $VERSION"
          echo "Git tag:      $TAG"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION file ($VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "Version verification passed."

      - name: Generate release notes from changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          awk -v tag="$TAG" '
            /^## \['"$TAG"'\]/ { capture=1; next }
            /^## \[/ { if (capture) exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "WARNING: No changelog entry found for $TAG, using fallback."
            echo "Release $TAG" > /tmp/release_notes.md
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            --verify-tag
