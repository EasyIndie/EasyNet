name: Tests

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  automated-tests:
    name: Automated test suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-26.04]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Cache shellcheck
        id: cache-shellcheck
        uses: actions/cache@v6
        with:
          path: /usr/local/bin/shellcheck
          key: shellcheck-${{ runner.os }}-v0.10.0

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ripgrep bats

      - name: Install shellcheck
        if: steps.cache-shellcheck.outputs.cache-hit != 'true'
        run: |
          SC_VERSION="v0.10.0"
          wget -q "https://github.com/koalaman/shellcheck/releases/download/$SC_VERSION/shellcheck-$SC_VERSION.linux.x86_64.tar.xz"
          tar -xf "shellcheck-$SC_VERSION.linux.x86_64.tar.xz"
          sudo mv "shellcheck-$SC_VERSION/shellcheck" /usr/local/bin/shellcheck
          rm -rf "shellcheck-$SC_VERSION" "shellcheck-$SC_VERSION.linux.x86_64.tar.xz"

      - name: Run shellcheck
        run: |
          find scripts tests -type f \( -name "*.sh" -o -name "*.bash" \) \
            -exec shellcheck --rcfile=.shellcheckrc --shell=bash --severity=style {} +

      - name: Check script file permissions
        run: |
          # Fail if any .sh file with an entrypoint guard (BASH_SOURCE[0] == $0)
          # is not tracked as executable. Library files without this guard
          # (sourced by other scripts) are intentionally 100644.
          fail=0
          while IFS= read -r file; do
            mode=$(git ls-files --stage "$file" | awk '{print $1}')
            [ "$mode" = "100755" ] && continue
            if grep -qE 'BASH_SOURCE\[0\].*==.*\$0' "$file" 2>/dev/null; then
              echo "FAIL: $file has entrypoint guard but is not executable (mode=$mode)"
              fail=1
            fi
          done < <(find scripts tests -name '*.sh' -type f | sort)
          exit $fail

      - name: Run all tests
        run: bats --timing --formatter tap tests/*.bats

  integration-test:
    name: Integration test (config generation)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-26.04]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ripgrep

      - name: Validate config generation (dry-run)
        run: |
          mkdir -p /tmp/easynet-test/modules/xray-reality
          cat > /tmp/easynet-test/modules/xray-reality/metadata.json <<'JSON'
          {"schemaVersion":1,"module":"xray-reality","enabled":true,"protocol":"vless","port":8443,"client":{"uri":"vless://example","clash":{"server":"10.0.0.1","port":8443}}}
          JSON
          mkdir -p /tmp/easynet-test/exposure/edge
          echo "test.example.com" > /tmp/easynet-test/exposure/edge/domain.txt
          echo "https" > /tmp/easynet-test/exposure/edge/scheme.txt
          echo "/s/test" > /tmp/easynet-test/exposure/edge/subscription_path_prefix.txt
          EASYNET_STATE_DIR=/tmp/easynet-test EASYNET_WEB_ROOT=/tmp/easynet-web \
            bash scripts/generate_subscription.sh
          [ -s /tmp/easynet-web/sub ] && echo "OK: subscription generated"
          [ -s /tmp/easynet-web/clash ] && echo "OK: clash generated"
          [ -s /tmp/easynet-web/singbox ] && echo "OK: singbox generated"
          rm -rf /tmp/easynet-test /tmp/easynet-web

  release:
    name: Create GitHub Release
    needs: [automated-tests, integration-test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes from changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          awk -v tag="$TAG" '
            /^## \['"$TAG"'\]/ { capture=1; next }
            /^## \[/ { if (capture) exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "WARNING: No changelog entry found for $TAG, using fallback."
            echo "Release $TAG" > /tmp/release_notes.md
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md \
            --verify-tag
