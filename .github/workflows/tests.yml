name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  automated-tests:
    name: Automated test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck bats

      - name: Run shellcheck
        run: |
          find scripts tests -type f \( -name "*.sh" -o -name "*.bash" \) \
            -exec shellcheck --rcfile=.shellcheckrc --shell=bash --severity=style {} +

      - name: Run all tests
        run: bats --timing --pretty tests/*.bats

  integration-test:
    name: Integration test (config generation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Validate config generation (dry-run)
        run: |
          mkdir -p /tmp/easynet-test/modules/xray-reality
          cat > /tmp/easynet-test/modules/xray-reality/metadata.json <<'JSON'
          {"schemaVersion":1,"module":"xray-reality","enabled":true,"protocol":"vless","port":8443,"client":{"uri":"vless://example","clash":{"server":"10.0.0.1","port":8443}}}
          JSON
          mkdir -p /tmp/easynet-test/exposure/edge
          echo "test.example.com" > /tmp/easynet-test/exposure/edge/domain.txt
          echo "https" > /tmp/easynet-test/exposure/edge/scheme.txt
          echo "/s/test" > /tmp/easynet-test/exposure/edge/subscription_path_prefix.txt
          EASYNET_STATE_DIR=/tmp/easynet-test EASYNET_WEB_ROOT=/tmp/easynet-web \
            bash scripts/generate_subscription.sh
          [ -s /tmp/easynet-web/sub ] && echo "OK: subscription generated"
          [ -s /tmp/easynet-web/clash ] && echo "OK: clash generated"
          [ -s /tmp/easynet-web/singbox ] && echo "OK: singbox generated"
          rm -rf /tmp/easynet-test /tmp/easynet-web
