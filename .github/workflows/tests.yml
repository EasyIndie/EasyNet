name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  automated-tests:
    name: Automated test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck bats

      - name: Run shellcheck
        run: |
          find scripts tests -type f \( -name "*.sh" -o -name "*.bash" \) \
            -exec shellcheck --rcfile=.shellcheckrc --shell=bash --severity=style {} +

      - name: Run all tests
        run: bats --timing --pretty tests/*.bats

  integration-test:
    name: Integration test (real deployment)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep
