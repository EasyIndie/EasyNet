name: Feature Request
description: Suggest an idea for EasyNet
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please check [existing issues](https://github.com/EasyIndie/EasyNet/issues) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What do you want to happen?
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you considered?
      placeholder: Any alternative solutions or features you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the project does this affect?
      multiple: true
      options:
        - Core deployment
        - New protocol
        - Client configuration
        - Subscription system
        - Documentation
        - Tests
        - CI / tooling
